ansible_host: 127.0.0.1
ansible_user: s1
ansible_connection: local

cloudflare_tunnel_token: "{{ vault_cloudflare_tunnel_token }}"

# MSSQL
mssql_sa_password: "{{ vault_mssql_sa_password }}"

# Grafana
grafana_admin_password: "{{ vault_grafana_admin_password }}"
grafana_mssql_database: "S1_Remote_Monitoring"

# Grafana Git Sync
grafana_git_sync_enabled: true
grafana_git_sync_token: "{{ vault_grafana_git_sync_token }}"
grafana_git_sync_branch: "main"
grafana_git_sync_path: "grafana/"

# Grafana API provisioning
grafana_api_provision_enabled: true
grafana_orgs:
  - name: "Main Org."

grafana_users:
  - login: "jonathan"
    email: "jonathan@systems-one.com"
    name: "Jonathan"
    password: "{{ vault_grafana_jonathan_password }}"
    orgs:
      - name: "Main Org."
        role: "Admin"
  - login: "avi"
    email: "avi"
    name: "Avi"
    password: "{{ vault_grafana_avi_password }}"
    orgs:
      - name: "Main Org."
        role: "Viewer"
  - login: "chris"
    email: "chris"
    name: "Chris"
    password: "{{ vault_grafana_chris_password }}"
    orgs:
      - name: "Main Org."
        role: "Viewer"
  - login: "pkluser"
    email: "pkluser"
    name: "PKL User Group"
    password: "{{ vault_grafana_pkluser_password }}"
    orgs:
      - name: "Main Org."
        role: "Viewer"

# OpenClaw
openclaw_msteams_enabled: false
openclaw_gateway_auth_token: "{{ vault_openclaw_gateway_token }}"
openclaw_msteams_app_id: ""
openclaw_msteams_app_password: ""
openclaw_msteams_tenant_id: ""

# MQTT Broker (local)
mqtt_username: 'admin'
mqtt_password: 'admin'

# Cloudflared
cloudflared_network_mode: host

# Node-RED (ingest)
nodered_bind_address: '0.0.0.0'
nodered_port: 1880

# Use bridge networking on staging so we can publish ports explicitly.
nodered_network_mode: bridge

# Publish TCP ports for remote systems to connect to this host (bind all interfaces so IP changes don't matter).
nodered_extra_tcp_ports_bind_address: '0.0.0.0'
nodered_extra_tcp_ports:
  - 10069
  - 10070
  - 10071
  - 10072
  - 10073

# High port: no privileged bind capability needed.
nodered_allow_privileged_port_bind: false

# Systems One ingest (configured via Ansible host_vars, injected into container environment)
systems_one_ingest_mqtt_host: mosquitto
systems_one_ingest_mqtt_port: 1883
systems_one_ingest_mqtt_username: "{{ mqtt_username }}"
systems_one_ingest_mqtt_password: "{{ mqtt_password }}"
systems_one_ingest_mqtt_client_id: mqtt_ingest
systems_one_ingest_mqtt_transport: tcp
systems_one_ingest_mqtt_tls: false
systems_one_ingest_mqtt_tls_insecure: false
systems_one_ingest_mqtt_keepalive: 60
systems_one_ingest_mqtt_ws_path: ""

systems_one_ingest_topics: "systems-one/#,systemsone/#"
systems_one_ingest_qos: 0
systems_one_ingest_log_level: INFO

systems_one_ingest_db_enable: true
systems_one_ingest_db_host: mssql
systems_one_ingest_db_port: 1433
systems_one_ingest_db_name: "{{ mssql_rm_database }}"
systems_one_ingest_db_user: "{{ mssql_rm_admin_login }}"
systems_one_ingest_db_password: "{{ mssql_rm_admin_password }}"
systems_one_ingest_db_driver: "ODBC Driver 18 for SQL Server"
systems_one_ingest_db_encrypt: optional
systems_one_ingest_db_trust_server_cert: ""
systems_one_ingest_db_connect_timeout: 5
systems_one_ingest_db_connect_on_start: false
systems_one_ingest_db_connect_required: false

systems_one_ingest_run_seconds: ""
