name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install ansible-lint yamllint

      - name: Run yamllint
        run: yamllint -d relaxed .

      - name: Run ansible-lint
        run: ansible-lint --profile=min site.yml
        continue-on-error: true

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible

      - name: Syntax check site.yml
        run: |
          ansible-playbook site.yml --syntax-check \
            -i production \
            -e "mssql_sa_password=test \
                mssql_app_login_password=test \
                grafana_admin_password=test \
                grafana_jonathan_password=test \
                grafana_avi_password=test \
                grafana_chris_password=test \
                grafana_pkluser_password=test \
                mqtt_password=test \
                openclaw_gateway_auth_token=test \
                grafana_git_sync_token=test \
                cloudflare_tunnel_token=test \
                openclaw_msteams_app_password=test \
                vault_s1_reporter_smtp_user=test@test.com \
                vault_s1_reporter_smtp_pass=test \
                vault_s1_reporter_report_to=test@test.com"

  molecule:
    name: Molecule (docker role)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ansible molecule molecule-plugins[docker] docker

      - name: Run Molecule
        run: molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          ANSIBLE_ROLES_PATH: "${{ github.workspace }}/roles"
