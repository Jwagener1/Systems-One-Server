# Grafana service defaults

grafana_port: 3000
grafana_bind_address: "127.0.0.1"

grafana_admin_user: "admin"
# grafana_admin_password must be provided via host_vars or vault

# Enable Grafana v12 Git Sync (k8s provisioning API)
grafana_git_sync_enabled: false

# Legacy file-based dashboard provisioning
# Disable when using Git Sync to avoid conflicts
grafana_dashboards_file_provisioning_enabled: true

# grafana_root_url: ""

# Provision orgs/users via Grafana HTTP API after Grafana starts
grafana_api_provision_enabled: false

grafana_api_scheme: "http"
grafana_api_host: "127.0.0.1"
grafana_api_port: "{{ grafana_port }}"
grafana_api_validate_certs: false

grafana_orgs: []
grafana_users: []
grafana_teams: []

# Git Sync - Grafana v12 k8s provisioning API
# Dashboards repo: https://github.com/Jwagener1/grafana
# Dashboards live under grafana/ folder in that repo
grafana_git_sync_repo: "https://github.com/Jwagener1/grafana"
grafana_git_sync_branch: "main"
grafana_git_sync_path: "grafana/"
grafana_git_sync_token: ""

grafana_dashboard_folders_from_files: true
