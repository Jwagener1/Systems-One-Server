---
- name: Ensure s1_reporter directory exists
  file:
    path: "{{ s1_reporter_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy Dockerfile
  copy:
    src: Dockerfile
    dest: "{{ s1_reporter_dir }}/Dockerfile"
    owner: root
    group: root
    mode: "0644"

- name: Copy report.py
  copy:
    src: report.py
    dest: "{{ s1_reporter_dir }}/report.py"
    owner: root
    group: root
    mode: "0644"

- name: Copy upload_monitor.py
  copy:
    src: upload_monitor.py
    dest: "{{ s1_reporter_dir }}/upload_monitor.py"
    owner: root
    group: root
    mode: "0644"

- name: Copy entrypoint.sh
  copy:
    src: entrypoint.sh
    dest: "{{ s1_reporter_dir }}/entrypoint.sh"
    owner: root
    group: root
    mode: "0755"

- name: Render s1_reporter docker-compose
  template:
    src: docker-compose.s1_reporter.yml.j2
    dest: "{{ s1_reporter_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Build and start s1_reporter container
  command: docker compose up -d --build
  args:
    chdir: "{{ s1_reporter_dir }}"
  register: s1_reporter_up
  changed_when: "'Started' in s1_reporter_up.stdout or 'Recreated' in s1_reporter_up.stdout"
