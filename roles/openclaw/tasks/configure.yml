---
- name: Validate required variables
  assert:
    that:
      - openclaw_gateway_auth_token is defined
      - openclaw_gateway_auth_token | length > 0
    fail_msg: >-
      Missing required variable 'openclaw_gateway_auth_token'.
      Provide it in host_vars or Ansible Vault as vault_openclaw_gateway_token.

- name: Render OpenClaw config
  template:
    src: openclaw.json.j2
    dest: "{{ openclaw_install_dir }}/openclaw.json"
    owner: "{{ openclaw_install_user }}"
    group: "{{ openclaw_install_user }}"
    mode: "0600"
  no_log: true
  notify: Restart OpenClaw

- name: Install MS Teams plugin (if enabled)
  command: openclaw plugin install @openclaw/msteams
  become: true
  become_user: "{{ openclaw_install_user }}"
  when: openclaw_msteams_enabled | bool
  register: openclaw_msteams_install
  changed_when: "'already installed' not in openclaw_msteams_install.stdout"
  failed_when: openclaw_msteams_install.rc != 0 and 'already installed' not in openclaw_msteams_install.stdout
