---
- name: Install OpenClaw gateway as systemd service
  command: openclaw gateway install
  become: true
  become_user: "{{ openclaw_install_user }}"
  register: openclaw_service_install
  changed_when: "'already installed' not in openclaw_service_install.stdout"
  failed_when: openclaw_service_install.rc != 0 and 'already installed' not in openclaw_service_install.stdout

- name: Enable and start OpenClaw gateway service
  systemd:
    name: "openclaw-gateway-{{ openclaw_install_user }}"
    enabled: true
    state: started
    daemon_reload: true
